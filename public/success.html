<!DOCTYPE html>
<html>
<head>
  <title>WesDiva MODERN LUXURY | Payment Success</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            bg: "#FFFFFF",
            cream: "#F8F8F8",
            pink: "#E91E63",
            purple: "#9C27B0",
            green: "#4CAF50",
            dark: "#333333",
            charcoal: "#1A1A1A",
            border: "#E0E0E0"
          }
        }
      }
    }
  }
  </script>
</head>

<body class="
  bg-brand-bg
  text-brand-dark
  flex items-center
  justify-center
  h-screen
">

<div class="
  bg-brand-cream
  border border-brand-border
  p-10
  rounded-xl
  text-center
  shadow-lg
  max-w-md
">

  <!-- Success Title -->
  <h2 class="
    text-3xl
    font-light
    mb-4
    text-brand-green
  ">
    Payment Successful
  </h2>

  <!-- Message -->
  <p class="mb-4">
    Your order has been placed successfully.
  </p>

  <!-- Order ID -->
  <p
    id="orderId"
    class="
      text-sm
      text-gray-600
      mb-6
    "
  >
  </p>

  <!-- CTA -->
  <a
    href="/"
    class="
      inline-block
      bg-brand-pink
      text-white
      px-6 py-2
      rounded-lg
      hover:bg-brand-purple
      transition
    "
  >
    Continue Shopping
  </a>

</div>

<script>
/**
 * Read order_id from URL
 * Example:
 * /success.html?order_id=ORD_123
 */
const params =
  new URLSearchParams(
    window.location.search
  );

const orderId =
  params.get("order_id");

if (orderId) {

  document.getElementById(
    "orderId"
  ).innerText =
    "Order ID: " + orderId;
}
</script>

</body>
</html>
